# Animation source. This is the only file you need to edit;
# everything under dist/ is generated from it.
#
#   make            rebuild dist/bio.anim and dist/bio.svg from this file
#
# Directives go above the '---'; everything below it is the info block shown
# beside the torus. Blank lines there are significant.

@frames    24                             # frames in one loop
@duration  4.0                            # seconds per loop
@phase     1.1                            # starting angle, radians
@cols      40                             # torus viewport width
@rows      18                             # torus viewport height
@fill      0.92                            # how much of the viewport it fills
@caption   right                          # 'left' or 'right' of the torus, or 'below'
@border    off                            # 'on' draws an ASCII frame
@header                                   # plain line above; blank for none
@title     Rotating ASCII torus, 4rknova  # accessible label on the SVG
@fontsize  14                             # px, in the rendered SVG
@color     #636c76                        # glyph colour on a light background
@color_dark #7d8590                       # glyph colour on a dark background

